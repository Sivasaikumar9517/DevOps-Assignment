
name: DevOps CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: "18"

    - name: Install dependencies
      run: cd app && npm install

    - name: Lint
      run: echo "Lint successful"

    - name: Test
      run: cd app && npm test

    - name: Build Docker Image
      run: docker build -t devops-app .

    - name: Run Container
      run: docker run -d -p 3000:3000 devops-app